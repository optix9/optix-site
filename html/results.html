<!DOCTYPE html>

<html>

  <head>
    <title>Optix - Results</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel='stylesheet' href="../css/results.css">
    <script src="https://code.jquery.com/jquery-3.6.3.min.js"></script>
  </head>

  <body>

    <div id="top-page">
      <h2 id="header">Optix</h2>
    </div>

    <h1>Quiz Results</h1>

    <div id="results-container">
      <h4 id="message"></h4>

      <div id="stats"></div>
        <p id="total" class="stat">Total Questions: </p>
        <h2 id="score" class="stat">Your score:</h2>
        <p id="percentage" class="stat">Percentage: </p>
        <p id="time" class="stat">Time: 1:45</p>
      </div>

      <button id="back-button" onclick="window.location.href = 'dashboard.html'">Back to Dashboard</button>

    </div>

    <script src="../js/results.js"></script>
    <script src="../js/dashboard.js"></script>

  </body>

</html>
