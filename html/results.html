<!DOCTYPE html>

<html>

  <head>
    <title>Optix - Results</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel='stylesheet' href="../css/otherfiles/results.css">
    <script src="https://code.jquery.com/jquery-3.6.3.min.js"></script>
  </head>

  <body>

    <div id="top-page">
      <h2 id="header">Optix</h2>
    </div>

    <h1 id="results-title">Quiz Results</h1>

    <div id="results-container">
      <div id="message-container">
        <h4 id="message"></h4>
      </div>

      <div id="stats">
        <p id="total" class="stat">Total Questions: </p>
        <h2 id="score" class="stat">Your score:</h2>
        <p id="percentage" class="stat">Percentage: </p>
        <p id="time" class="stat">Time: 1:45</p>
      </div>

      <div id="button-redirect">
        <button id="back-button" onclick="window.location.href = 'dashboard-files-html/dashboard.html'">Back to Dashboard</button>
      </div>

    </div>

    <script type="module" src="../js/pages/results.js"></script>

    <script type="module">
      import { requireLogin } from "../js/shared/auth.js";

      requireLogin();
    </script>

  </body>

</html>
