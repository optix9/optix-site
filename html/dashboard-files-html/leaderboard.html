<!DOCTYPE html>
<html lang="en">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard</title>
    <link rel="stylesheet" href="../../css/dashboard-files/global.css">
    <link rel="stylesheet" href="../../css/dashboard-files/leaderboard.css">
</head>

<body>

  <aside class="sidebar">

      <div class="sidebar-logo">
        <img src="../../images/optix-logo.png">
        <h2>OPTIX</h2>
      </div>

      <div id="sidebar-1">
        <ul>
          <li id="dashboard-li" onclick="location.href='dashboard.html'">🏠Dashboard</li>
          <li id="practice" onclick="location.href='practice.html'">📝Practice</li>
          <li id="challenge" onclick="location.href='challenge.html'">🎮Challenge</li>
          <li id="history" onclick="location.href='history.html'">📜History</li>
          <li id="achievements" onclick="location.href='achievements.html'">🏆Achievements</li>
          <li id="leaderboard" class="current" onclick="location.href='leaderboard.html'">🏆Leaderboard</li>
          <li id="profile" onclick="location.href='profile.html'">🪪Profile</li>
          <li id="logout" onclick="location.href='logout.html'">🚪Logout</li>
        </ul>
      </div>

      <div class="sidebar-user">

        <div class="sidebar-user-info">
          <div class="sidebar-user-avatar"></div>
          <h3>Optix User</h3>
          <p>Level 6</p>
        </div>

        <div class="sidebar-xp-bar"></div>
      
        <div class="sidebar-stats"> 

          <div class="sidebar-stat">
            <div class="sst">
              <h1>🔥</h1>
            </div>
            
            <div class="est">
              <h2 id="streaktextd"></h2>
              <h3>Streak</h3>
            </div>
          </div>

          <div class="sidebar-stat">
            <div class="sst">
              <h1>💎</h1>
            </div>

            <div class="est">
              <h2>1,250</h2>
              <h3>XP</h3>
            </div>
          </div>

        </div>

      </div>

    </aside>

  <div id="leaderboard-container">

    <div class="hero">
      <h1>The Leaderboard</h1>
      <p>See how you rank against other learners</p>
    </div>

    <div class="leadtable">



      
    </div>

  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script type="module">
    import { requireLogin, logoutUser } from "../../js/shared/auth.js";

    requireLogin();

    const logoutBtn = document.getElementById('logout');

    if (logoutBtn) {
      logoutBtn.addEventListener("click", async () => {
        await logoutUser();
        window.location.href = "../login.html";
      });
    }

  </script>
 
</body>

</html>
