<!DOCTYPE html>

<html>

  <head>
    <title>Optix</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel='stylesheet' href="../css/redirection.css">
    <script src="https://code.jquery.com/jquery-3.6.3.min.js"></script>
  </head>


  <body>

    <div id="container">

      <h3>Optix</h3>
      <h5>Begin your Journey!</h5>

      <div class="form">
        <input type="text" id="name" placeholder="Please type your name.">
        <input type="text" id="reason" placeholder="Why did you choose this website?">
      </div>

      <div class="buttons-redirect">
        <button id="submitBtn">Start Now</button>
      </div>

    </div>

    <script>
    
      $("#submitBtn").click(function(){
        let name= $("#name").val();

        localStorage.setItem("username", name);
        console.log(name);

        window.location.href = "dashboard.html";
      });

    </script>

  </body>


</html>
